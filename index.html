<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>英雄联盟 · 极简小屏版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 12px;
        }
        .tool-container {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .tool-container.visible {
            opacity: 1;
        }
        .glass-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 18px 16px 22px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2ef;
        }
        .hero {
            text-align: center;
            margin-bottom: 16px;
        }
        .free-badge {
            display: inline-block;
            background: #fff3e0;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            color: #c27e2a;
            margin-bottom: 8px;
            border: 0.5px solid #ffe0a3;
        }
        .hero-icon {
            font-size: 36px;
            line-height: 1;
            margin-bottom: 4px;
        }
        .hero h1 {
            font-size: 22px;
            font-weight: 800;
            color: #1f8a5c;
            margin-bottom: 4px;
        }
        .hero-badge {
            font-size: 10px;
            background: #f5faf7;
            padding: 3px 10px;
            border-radius: 30px;
            display: inline-block;
            color: #2c6e4a;
        }
        .action-btn {
            width: 100%;
            padding: 10px 12px;
            margin: 6px 0;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            background: #ffffff;
            border: 1px solid #e2e8e2;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .action-btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: #23b574;
            color: white;
            border: none;
        }
        .channel-btn {
            background: #1e2f3c;
            color: #ffecb3;
            border: 1px solid #3e5a6b;
        }
        /* 激活状态 - 成功后的高亮样式 */
        .active-success {
            background: #23b574 !important;
            color: white !important;
            border: 1px solid #1a8c5a !important;
            box-shadow: 0 2px 6px rgba(35, 181, 116, 0.3);
        }
        .custom-active {
            background: #23b574 !important;
            color: white !important;
            border: 1px solid #1a8c5a !important;
        }
        .divider {
            height: 1px;
            background: #edf2ef;
            margin: 14px 0 12px;
        }
        .footer-note {
            font-size: 10px;
            text-align: center;
            color: #6c757d;
            margin-top: 14px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .footer-note a {
            color: #1f8a5c;
            text-decoration: none;
            font-weight: 500;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            width: 86%;
            max-width: 300px;
            background: #ffffff;
            border-radius: 32px;
            padding: 20px 18px 24px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid #e0e7e0;
        }
        .modal-icon {
            font-size: 40px;
            margin-bottom: 6px;
        }
        .modal-card h3 {
            font-size: 20px;
            font-weight: 800;
            color: #1f8a5c;
            margin-bottom: 8px;
        }
        .modal-warning {
            font-size: 12px;
            background: #fefaf0;
            padding: 10px;
            border-radius: 20px;
            text-align: left;
            margin: 12px 0;
            border-left: 3px solid #23b574;
            line-height: 1.4;
            color: #2b4e3a;
        }
        .input-group {
            margin: 12px 0 10px;
        }
        .input-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 60px;
            border: 1.5px solid #d4dcd4;
            background: #ffffff !important;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
            outline: none;
            color: #1a2e24;
        }
        .input-group input:focus {
            border-color: #23b574;
            box-shadow: 0 0 0 2px rgba(35, 181, 116, 0.1);
        }
        .modal-btn {
            background: #23b574;
            width: 100%;
            padding: 10px;
            border-radius: 60px;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 15px;
            margin-top: 6px;
            cursor: pointer;
        }
        .modal-btn:active {
            transform: scale(0.97);
            background: #1a8c5a;
        }
        .error-tip {
            font-size: 10px;
            color: #e67e22;
            margin-top: 4px;
        }
        .modal-footer-note {
            font-size: 9px;
            margin-top: 10px;
            color: #7c8c7c;
        }
    </style>
</head>
<body>

<!-- 验证弹窗 -->
<div id="entryModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-icon">🔴🟡🟢</div>
        <h3>仅供学习 · 禁止传播</h3>
        <div class="modal-warning">
            🔓 永久免费 · 仅学习交流<br>
            🚫 严禁任何贩卖行为，一经发现封禁<br>
            🛡️ 修改视距风险自负，请遵守游戏规则<br>
            💎 本工具永不收费，谨防受骗
        </div>
        <div class="input-group">
            <input type="text" id="confirmInput" placeholder="输入「OK」同意条款" autocomplete="off">
            <div id="modalError" class="error-tip"></div>
        </div>
        <button class="modal-btn" id="confirmBtn">✅ 确认进入 · 免费使用</button>
        <div class="modal-footer-note">✊ 加入频道获取免费教程</div>
    </div>
</div>

<!-- 主工具界面 -->
<div id="mainTool" class="tool-container">
    <div class="glass-card">
        <div class="hero">
            <div class="free-badge"> 💎𝐓𝐆频道@𝐢𝐎𝐒𝐀𝐖𝐉 </div>
            <div class="hero-icon">🈲️禁止任何盗卖</div>
            <h1> 英雄联盟·视距 </h1>
            <div class="hero-badge">自定义视距 · 流畅高帧</div>
        </div>

        <button id="button1" class="action-btn btn-primary">
            🔎① 2.0倍视距
        </button>
        <button id="button2" class="action-btn">
            🔎② 自定义视距 (0.1~9.9)
        </button>

        <div class="divider"></div>

        <button id="tgChannelBtn" class="action-btn channel-btn">
            ✈️ 加入 TG 频道 · 免费资源
        </button>

        <div class="footer-note">
            <span>© 2026 爱玩机</span>
            <span>🌹 学习研究</span>
            <a href="#" id="fakeChannelLink">📢 欢迎加入</a>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 1. 确保 h5gg 可用 ----------
        if (typeof h5gg === 'undefined') {
            if (window.parent && typeof window.parent.h5gg !== 'undefined') {
                window.h5gg = window.parent.h5gg;
            } else {
                alert('❌ 请在游戏内运行此插件');
                return;
            }
        }

        // ---------- 全局变量 ----------
        let memoryBase = null;          // UnityFramework 基址
        let intervalId = null;          // 2倍循环定时器
        let is2xActive = false;         // 2倍是否激活中

        const mainTool = document.getElementById('mainTool');
        const modalOverlay = document.getElementById('entryModal');
        const confirmInput = document.getElementById('confirmInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const modalError = document.getElementById('modalError');

        // 频道链接
        const channelUrl = "https://t.me/iOSAWJ";
        document.getElementById('tgChannelBtn').addEventListener('click', () => window.open(channelUrl, '_blank'));
        document.getElementById('fakeChannelLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.open(channelUrl, '_blank');
        });

        // ---------- 辅助函数：动态获取当前按钮元素 (确保样式总能更新到最新DOM) ----------
        function getBtn1() {
            return document.getElementById('button1');
        }
        function getBtn2() {
            return document.getElementById('button2');
        }

        // 刷新基址（如果丢失则重新获取）
        function refreshMemoryBase() {
            try {
                const ranges = h5gg.getRangesList('UnityFramework');
                if (ranges && ranges.length > 0) {
                    memoryBase = ranges[0].start;
                    return memoryBase;
                }
                memoryBase = null;
                return null;
            } catch(e) {
                memoryBase = null;
                return null;
            }
        }

        // 获取最终视距地址 (偏移链)
        // 链: UnityFramework + 0xDFB51C8 -> [+0x17A8] -> [+0x1098] -> [+0x1898] -> [+0x194]
        function getFinalAddress() {
            if (!memoryBase) {
                // 尝试重新获取
                if (!refreshMemoryBase()) {
                    throw new Error("UnityFramework基址获取失败");
                }
            }
            let ranges = h5gg.getRangesList('UnityFramework');
            if (!ranges || ranges.length === 0) throw new Error("找不到UnityFramework模块");
            let jz2 = Number(ranges[0].start) + 0xDFB51C8;
            jz2 = Number(h5gg.getValue(jz2, 'I64')) + 0x17A8;
            jz2 = Number(h5gg.getValue(jz2, 'I64')) + 0x1098;
            jz2 = Number(h5gg.getValue(jz2, 'I64')) + 0x1898;
            jz2 = Number(h5gg.getValue(jz2, 'I64')) + 0x194;
            return jz2;
        }

        // 停止2倍循环 (并更新按钮UI)
        function stop2xLoopAndUpdateUI() {
            if (intervalId !== null) {
                clearInterval(intervalId);
                intervalId = null;
            }
            is2xActive = false;
            // 更新2倍按钮样式为未激活
            const btn1 = getBtn1();
            if (btn1) {
                btn1.classList.remove('active-success');
                btn1.innerHTML = '🌟 ① 2.0倍视距';
            }
        }

        // 启动2倍循环写入 (setInterval 0)
        function start2xLoop() {
            if (!memoryBase && !refreshMemoryBase()) {
                alert("游戏基址未就绪，请确保在游戏内运行后重试");
                return false;
            }
            try {
                // 测试偏移链是否有效
                const finalAddr = getFinalAddress();
                if (!finalAddr || finalAddr === 0) throw new Error("计算地址失败");
                
                // 先停止之前的循环
                if (intervalId !== null) {
                    clearInterval(intervalId);
                    intervalId = null;
                }
                // 启动新循环
                intervalId = setInterval(() => {
                    try {
                        const addr = getFinalAddress();
                        h5gg.setValue(addr, 2.0, 'F32');
                    } catch(e) { /* 静默失败避免弹窗风暴 */ }
                }, 0);
                return true;
            } catch(e) {
                alert("启动2倍失败: " + e.message + "\n请检查游戏版本或偏移链");
                return false;
            }
        }

        // 核心：设置自定义视距 (一次性写入, 并且会关闭2倍循环)
        // 返回值: true=成功, false=失败
        function setCustomDistance(value) {
            if (!memoryBase && !refreshMemoryBase()) {
                alert("游戏基址未就绪，请重新进入游戏再试");
                return false;
            }
            try {
                // 如果2倍激活中，先停止循环并更新UI
                if (is2xActive) {
                    stop2xLoopAndUpdateUI();
                }
                // 获取最终地址并写入
                const finalAddr = getFinalAddress();
                h5gg.setValue(finalAddr, value, 'F32');
                return true;
            } catch(e) {
                alert("自定义视距写入失败: " + e.message);
                return false;
            }
        }

        // 更新UI：自定义成功后，自定义按钮高亮显示当前倍数，同时确保2倍按钮恢复普通样式
        function updateCustomButtonUI(value) {
            const btn2 = getBtn2();
            if (btn2) {
                btn2.classList.add('custom-active');
                // 保留一位小数显示更干净
                let displayVal = typeof value === 'number' ? value.toFixed(2) : value;
                btn2.innerHTML = `🟢 ② 自定义[${displayVal}x] · 已生效`;
            }
            // 额外确保2倍按钮样式为非激活 (因为自定义会停用2倍)
            const btn1 = getBtn1();
            if (btn1 && is2xActive === false) {
                btn1.classList.remove('active-success');
                btn1.innerHTML = '🛑① 2.0倍视距';
            }
        }

        // 重置自定义按钮到默认文案 (当2倍激活时调用)
        function resetCustomButtonToDefault() {
            const btn2 = getBtn2();
            if (btn2) {
                btn2.classList.remove('custom-active');
                btn2.innerHTML = '🛑② 自定义视距 (0.1~9.9)';
            }
        }

        // ---------- 按钮交互（完全基于实时DOM + 弹窗反馈）----------
        // 2.0倍视距按钮逻辑
        function toggle2xFeature() {
            // 先确保基址可用
            if (!memoryBase && !refreshMemoryBase()) {
                alert("❌ 游戏基址未就绪，请重新进入游戏内再运行此工具");
                return;
            }
            
            if (!is2xActive) {
                // 尝试开启2倍
                const success = start2xLoop();
                if (success) {
                    is2xActive = true;
                    // 更新2倍按钮样式
                    const btn1 = getBtn1();
                    if (btn1) {
                        btn1.classList.add('active-success');
                        btn1.innerHTML = '✅ ① 2.0倍 · 已激活';
                    }
                    // 将自定义按钮恢复默认样式 (因为2倍覆盖自定义效果)
                    resetCustomButtonToDefault();
                    // 给用户明确反馈
                    alert("✨ 2.0倍视距已激活！持续锁定中");
                } else {
                    alert("⚠️ 2倍激活失败，请检查游戏版本或偏移链");
                }
            } else {
                // 关闭2倍模式：因为无法自动恢复默认值，提示用户重进游戏恢复默认视距
                const userConfirm = confirm("当前2倍视距激活中");
                if (userConfirm) {
                    stop2xLoopAndUpdateUI();
                    alert("已停止2倍视距锁定。");
                }
            }
        }

        // 自定义视距逻辑 + alert 反馈 (用户明确要求 alert(`🟢自定义视距 ${val}x 已生效`))
        function customDistanceFeature() {
            if (!memoryBase && !refreshMemoryBase()) {
                alert("❌ 游戏基址未就绪，请确保在游戏内运行");
                return;
            }
            
            let input = prompt("请输入视距倍数 (0.1~9.9，推荐2.0~3.5)", "2.2");
            if (input === null) return; // 用户取消
            
            let val = parseFloat(input);
            if (isNaN(val) || val < 0.1 || val > 9.9) {
                alert("❌ 输入无效，请输入 0.1 ~ 9.9 之间的数字");
                return;
            }
            
            // 执行写入（内部会自动停止2倍循环并更新全局is2xActive）
            const success = setCustomDistance(val);
            if (success) {
                // ★ 严格按照用户要求: alert(`自定义视距 ${val}x 已生效`)
                alert(`自定义视距 ${val}x 已生效`);
                // 更新自定义按钮高亮 + 文本
                updateCustomButtonUI(val);
                // 如果2倍之前是激活的，setCustomDistance内部已经停止2倍并调用 stop2xLoopAndUpdateUI，
                // 但需要同步外部 is2xActive 状态以及按钮UI，确保彻底一致。
                // 注意 setCustomDistance 中已经调用了 stop2xLoopAndUpdateUI (如果is2xActive为true)
                // 但为防止遗漏，再次确保按钮1样式已恢复 (setCustomDistance调用了stop2xLoopAndUpdateUI会重置)
                // 但stop2xLoopAndUpdateUI里重置了btn1样式和文案，完美。
                // 如果之前2倍未激活，那只需更新自定义UI，无需额外操作。
                // 同时确保is2xActive为false
                if (is2xActive) {
                    // 防御: 理论上setCustomDistance已调stop2xLoopAndUpdateUI, 但再同步一次避免状态异常
                    is2xActive = false;
                }
                // 额外确保自定义按钮高亮已经显示
            } else {
                // 失败时已经有alert，不再重复
            }
        }

        // ---------- 初始内存检测及偏移验证 ----------
        function initMemoryAndCheck() {
            try {
                const base = refreshMemoryBase();
                if (base) {
                    // 测试偏移链是否可用
                    const testAddr = getFinalAddress();
                    if (testAddr && testAddr !== 0) {
                        // 偏移有效，无需额外弹窗
                        return true;
                    } else {
                        alert("⚠️ 偏移基址失败，当前游戏版本可能不兼容，视距修改功能将无法使用");
                        return false;
                    }
                } else {
                    alert("⚠️ 无法获取UnityFramework模块，请在游戏对局中重新打开本工具");
                    return false;
                }
            } catch(e) {
                console.error("初始化偏移检测", e);
                alert("初始化检测失败: " + e.message + "\n可能游戏版本不匹配，部分功能无法使用");
                return false;
            }
        }

        // ---------- 进入主界面，绑定全新事件，确保按钮反馈正常 ----------
        function enterMainTool() {
            modalOverlay.style.opacity = "0";
            setTimeout(() => {
                modalOverlay.style.display = "none";
                // 初始化内存基址及偏移链
                initMemoryAndCheck();
                mainTool.classList.add("visible");
                
                // ---------- 重新绑定按钮事件 (使用全新事件监听，避免重复绑定) ----------
                // 先移除可能残留的监听器最简单方式：克隆替换（保证完全干净）
                const oldBtn1 = document.getElementById('button1');
                const oldBtn2 = document.getElementById('button2');
                const newBtn1 = oldBtn1.cloneNode(true);
                const newBtn2 = oldBtn2.cloneNode(true);
                oldBtn1.parentNode.replaceChild(newBtn1, oldBtn1);
                oldBtn2.parentNode.replaceChild(newBtn2, oldBtn2);
                
                // 获取新按钮
                const finalBtn1 = document.getElementById('button1');
                const finalBtn2 = document.getElementById('button2');
                
                // 绑定全新事件
                finalBtn1.addEventListener('click', (e) => {
                    e.preventDefault();
                    toggle2xFeature();
                });
                finalBtn2.addEventListener('click', (e) => {
                    e.preventDefault();
                    customDistanceFeature();
                });
                
                // 频道按钮无需重新绑定（原先已绑定，且未被替换，但确保一下）
                const tgBtn = document.getElementById('tgChannelBtn');
                if (tgBtn && !tgBtn.hasAttribute('data-bound')) {
                    // 避免重复绑定，但克隆不影响，简单处理: 如果已经绑定就不重复
                    tgBtn.setAttribute('data-bound', 'true');
                    // 但原本绑定过了，为了防止丢失重新绑定一次（无副作用）
                    const newTg = tgBtn.cloneNode(true);
                    tgBtn.parentNode.replaceChild(newTg, tgBtn);
                    newTg.addEventListener('click', () => window.open(channelUrl, '_blank'));
                    document.getElementById('fakeChannelLink').addEventListener('click', (e) => {
                        e.preventDefault();
                        window.open(channelUrl, '_blank');
                    });
                } else if (tgBtn) {
                    // 已经绑定过
                }
                // 确保假链接事件
                const fakeLink = document.getElementById('fakeChannelLink');
                if (fakeLink) {
                    // 移除原有事件再绑定避免重复
                    const newFake = fakeLink.cloneNode(true);
                    fakeLink.parentNode.replaceChild(newFake, fakeLink);
                    newFake.addEventListener('click', (e) => {
                        e.preventDefault();
                        window.open(channelUrl, '_blank');
                    });
                }
            }, 200);
        }

        // ---------- 模态框验证逻辑 ----------
        function verifyAndEnter() {
            const userInput = confirmInput.value.trim();
            if (userInput === "OK") {
                modalError.innerText = "";
                confirmInput.style.borderColor = "#d4dcd4";
                enterMainTool();
            } else {
                modalError.innerText = "⚠️ 请输入「OK」确认条款";
                confirmInput.style.borderColor = "#e67e22";
                setTimeout(() => {
                    if (modalError.innerText === "⚠️ 请输入「OK」确认条款") {
                        modalError.innerText = "";
                    }
                    confirmInput.style.borderColor = "#d4dcd4";
                }, 1500);
            }
        }
        
        confirmBtn.addEventListener('click', verifyAndEnter);
        confirmInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') verifyAndEnter(); });
        
        // 初始状态: 显示模态框，主界面隐藏
        mainTool.classList.remove('visible');
        modalOverlay.style.display = 'flex';
        
        // 额外暴露全局清理定时器（可选，避免页面卸载时继续运行）
        window.addEventListener('beforeunload', function() {
            if (intervalId !== null) {
                clearInterval(intervalId);
                intervalId = null;
            }
        });
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>英雄联盟 · 极简小屏版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 12px;
        }
        .tool-container {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .tool-container.visible {
            opacity: 1;
        }
        .glass-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 18px 16px 22px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2ef;
        }
        .hero {
            text-align: center;
            margin-bottom: 16px;
        }
        .free-badge {
            display: inline-block;
            background: #fff3e0;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            color: #c27e2a;
            margin-bottom: 8px;
            border: 0.5px solid #ffe0a3;
        }
        .hero-icon {
            font-size: 36px;
            line-height: 1;
            margin-bottom: 4px;
        }
        .hero h1 {
            font-size: 22px;
            font-weight: 800;
            color: #1f8a5c;
            margin-bottom: 4px;
        }
        .hero-badge {
            font-size: 10px;
            background: #f5faf7;
            padding: 3px 10px;
            border-radius: 30px;
            display: inline-block;
            color: #2c6e4a;
        }
        .action-btn {
            width: 100%;
            padding: 10px 12px;
            margin: 6px 0;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            background: #ffffff;
            border: 1px solid #e2e8e2;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .action-btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: #23b574;
            color: white;
            border: none;
        }
        .channel-btn {
            background: #1e2f3c;
            color: #ffecb3;
            border: 1px solid #3e5a6b;
        }
        /* 激活状态 - 成功后的高亮样式 */
        .active-success {
            background: #23b574 !important;
            color: white !important;
            border: 1px solid #1a8c5a !important;
            box-shadow: 0 2px 6px rgba(35, 181, 116, 0.3);
        }
        /* 自定义按钮激活样式（也使用绿色，但保留区分） */
        .custom-active {
            background: #23b574 !important;
            color: white !important;
            border: 1px solid #1a8c5a !important;
        }
        .divider {
            height: 1px;
            background: #edf2ef;
            margin: 14px 0 12px;
        }
        .footer-note {
            font-size: 10px;
            text-align: center;
            color: #6c757d;
            margin-top: 14px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .footer-note a {
            color: #1f8a5c;
            text-decoration: none;
            font-weight: 500;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            width: 86%;
            max-width: 300px;
            background: #ffffff;
            border-radius: 32px;
            padding: 20px 18px 24px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid #e0e7e0;
        }
        .modal-icon {
            font-size: 40px;
            margin-bottom: 6px;
        }
        .modal-card h3 {
            font-size: 20px;
            font-weight: 800;
            color: #1f8a5c;
            margin-bottom: 8px;
        }
        .modal-warning {
            font-size: 12px;
            background: #fefaf0;
            padding: 10px;
            border-radius: 20px;
            text-align: left;
            margin: 12px 0;
            border-left: 3px solid #23b574;
            line-height: 1.4;
            color: #2b4e3a;
        }
        .input-group {
            margin: 12px 0 10px;
        }
        .input-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 60px;
            border: 1.5px solid #d4dcd4;
            background: #ffffff !important;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
            outline: none;
            color: #1a2e24;
        }
        .input-group input:focus {
            border-color: #23b574;
            box-shadow: 0 0 0 2px rgba(35, 181, 116, 0.1);
        }
        .modal-btn {
            background: #23b574;
            width: 100%;
            padding: 10px;
            border-radius: 60px;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 15px;
            margin-top: 6px;
            cursor: pointer;
        }
        .modal-btn:active {
            transform: scale(0.97);
            background: #1a8c5a;
        }
        .error-tip {
            font-size: 10px;
            color: #e67e22;
            margin-top: 4px;
        }
        .modal-footer-note {
            font-size: 9px;
            margin-top: 10px;
            color: #7c8c7c;
        }
    </style>
</head>
<body>

<!-- 验证弹窗 -->
<div id="entryModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-icon">🔴🟡🟢</div>
        <h3>仅供学习 · 禁止传播</h3>
        <div class="modal-warning">
            🔓 永久免费 · 仅学习交流<br>
            🚫 严禁任何贩卖行为，一经发现封禁<br>
            🛡️ 修改视距风险自负，请遵守游戏规则<br>
            💎 本工具永不收费，谨防受骗
        </div>
        <div class="input-group">
            <input type="text" id="confirmInput" placeholder="输入「OK」同意条款" autocomplete="off">
            <div id="modalError" class="error-tip"></div>
        </div>
        <button class="modal-btn" id="confirmBtn">✅ 确认进入 · 免费使用</button>
        <div class="modal-footer-note">✊ 加入频道获取免费教程</div>
    </div>
</div>

<!-- 主工具界面 -->
<div id="mainTool" class="tool-container">
    <div class="glass-card">
        <div class="hero">
            <div class="free-badge"> 💎𝐓𝐆频道@𝐢𝐎𝐒𝐀𝐖𝐉 </div>
            <div class="hero-icon">🈲️禁止任何盗卖</div>
            <h1> 英雄联盟·视距 </h1>
            <div class="hero-badge">自定义视距 · 流畅高帧</div>
        </div>

        <button id="button1" class="action-btn btn-primary">
            🌟 ① 2.0倍视距
        </button>
        <button id="button2" class="action-btn">
            🎛️ ② 自定义视距 (0.1~9.9)
        </button>

        <div class="divider"></div>

        <button id="tgChannelBtn" class="action-btn channel-btn">
            ✈️ 加入 TG 频道 · 免费资源
        </button>

        <div class="footer-note">
            <span>© 2026 爱玩机</span>
            <span>🌹 学习研究</span>
            <a href="#" id="fakeChannelLink">📢 欢迎加入</a>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 1. 确保 h5gg 可用 ----------
        if (typeof h5gg === 'undefined') {
            if (window.parent && typeof window.parent.h5gg !== 'undefined') {
                window.h5gg = window.parent.h5gg;
            } else {
                alert('❌ 请在游戏内运行此插件');
                return;
            }
        }

        // ---------- 全局变量 ----------
        let memoryBase = null;
        let intervalId = null;          // 2倍循环定时器
        let is2xActive = false;         // 2倍是否激活

        const mainTool = document.getElementById('mainTool');
        const modalOverlay = document.getElementById('entryModal');
        const confirmInput = document.getElementById('confirmInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const modalError = document.getElementById('modalError');
        const btn1 = document.getElementById('button1');
        const btn2 = document.getElementById('button2');

        // 频道链接
        const channelUrl = "https://t.me/iOSAWJ";
        document.getElementById('tgChannelBtn').addEventListener('click', () => window.open(channelUrl, '_blank'));
        document.getElementById('fakeChannelLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.open(channelUrl, '_blank');
        });

        // 获取 UnityFramework 基址
        function getMemoryBase() {
            try {
                const ranges = h5gg.getRangesList('UnityFramework');
                if (ranges && ranges.length > 0) {
                    return ranges[0].start;
                }
                return null;
            } catch(e) {
                console.error("获取基址失败", e);
                return null;
            }
        }

        // ---------- 核心：计算最终视距地址（用户提供的极简链）----------
        // 链: UnityFramework + 0xDFB51C8 -> [+0x17A8] -> [+0x1098] -> [+0x1898] -> [+0x194]
        function getFinalAddress() {
            if (!memoryBase) {
                throw new Error("基址未就绪");
            }
            let X = h5gg.getRangesList('UnityFramework');
            if (!X || X.length === 0) throw new Error("找不到UnityFramework模块");
            let jz2 = Number(X[0].start) + 0xDFB51C8;
            jz2 = Number(h5gg.getValue(jz2, 'I64')) + 0x17A8;
            jz2 = Number(h5gg.getValue(jz2, 'I64')) + 0x1098;
            jz2 = Number(h5gg.getValue(jz2, 'I64')) + 0x1898;
            jz2 = Number(h5gg.getValue(jz2, 'I64')) + 0x194;
            return jz2;
        }

        // 停止2倍循环
        function stop2xLoop() {
            if (intervalId !== null) {
                clearInterval(intervalId);
                intervalId = null;
            }
        }

        // 启动2倍循环写入（setInterval 0）
        function start2xLoop() {
            if (!memoryBase) {
                alert("游戏基址未就绪，请重新进入");
                return false;
            }
            try {
                const finalAddr = getFinalAddress();
                if (!finalAddr || finalAddr === 0) throw new Error("计算地址失败");
                stop2xLoop();
                intervalId = setInterval(() => {
                    try {
                        h5gg.setValue(finalAddr, 2.0, 'F32');
                    } catch(e) {}
                }, 0);
                return true;
            } catch(e) {
                alert("启动2倍失败: " + e.message);
                return false;
            }
        }

        // 自定义一次性写入（先停止2倍）
        function setCustomDistance(val) {
            if (!memoryBase) {
                alert("游戏基址未就绪，请重新进入");
                return false;
            }
            try {
                if (is2xActive) {
                    stop2xLoop();
                    is2xActive = false;
                    // 恢复2倍按钮样式
                    btn1.classList.remove('active-success');
                    btn1.innerHTML = '🌟 ① 2.0倍视距';
                }
                const finalAddr = getFinalAddress();
                h5gg.setValue(finalAddr, val, 'F32');
                return true;
            } catch(e) {
                alert("自定义视距失败: " + e.message);
                return false;
            }
        }

        // ---------- 按钮交互（提示直接在按钮上，颜色区分）----------
        function toggle2x() {
            if (!memoryBase) {
                alert("游戏基址未就绪，请重新进入");
                return;
            }
            if (!is2xActive) {
                // 尝试开启2倍
                if (start2xLoop()) {
                    is2xActive = true;
                    // 2倍按钮变为成功样式
                    btn1.classList.add('active-success');
                    btn1.innerHTML = '✅ ① 2.0倍 · 已激活';
                    // 如果自定义按钮是激活状态，恢复它
                    if (btn2.classList.contains('custom-active')) {
                        btn2.classList.remove('custom-active');
                        btn2.innerHTML = '💬② 自定义视距 (0.1~9.9)';
                    }
                }
            } else {
                // 关闭2倍
                if (confirm("恢复默认请重进游戏")) {
                    stop2xLoop();
                    is2xActive = false;
                    btn1.classList.remove('active-success');
                    btn1.innerHTML = '🌟 ① 2.0倍视距';
                }
            }
        }

        function customDistance() {
            if (!memoryBase) {
                alert("游戏基址未就绪，请重新进入");
                return;
            }
            let input = prompt("请输入视距倍数 (0.1~9.9)", "2.2");
            if (input === null) return;
            let val = parseFloat(input);
            if (isNaN(val) || val < 0.1 || val > 9.9) {
                alert("请输入 0.1~9.9 之间的数字");
                return;
            }
            if (setCustomDistance(val)) {
                // 自定义成功：按钮高亮并显示倍数
                btn2.classList.add('custom-active');
                btn2.innerHTML = `🎯 ② 自定义[${val}x] · 已生效`;
                // 如果2倍是激活状态，已经在上面的setCustomDistance里被停用了，但还需要确保2倍按钮样式恢复
                if (is2xActive) {
                    // 理论上setCustomDistance已经处理了is2xActive和btn1样式，但再保险一下
                    is2xActive = false;
                    btn1.classList.remove('active-success');
                    btn1.innerHTML = '🌟 ① 2.0倍视距';
                }
            }
        }

        // 绑定事件（避免重复绑定）
        function bindEvents() {
            const newBtn1 = btn1.cloneNode(true);
            const newBtn2 = btn2.cloneNode(true);
            btn1.parentNode.replaceChild(newBtn1, btn1);
            btn2.parentNode.replaceChild(newBtn2, btn2);
            document.getElementById('button1').addEventListener('click', toggle2x);
            document.getElementById('button2').addEventListener('click', customDistance);
            // 更新全局按钮引用
            window.btn1 = document.getElementById('button1');
            window.btn2 = document.getElementById('button2');
            // 重新赋值给外部变量（因为克隆后原变量指向旧元素）
            Object.assign(btn1, { parentNode: window.btn1.parentNode }); // 简单重新获取
            // 直接重新获取
            window.location.reload ? null : null;
        }

        // 由于克隆导致原btn1/btn2失效，我们重新获取
        function refreshButtons() {
            return {
                btn1: document.getElementById('button1'),
                btn2: document.getElementById('button2')
            };
        }

        // 验证并进入
        function verifyAndEnter() {
            const userInput = confirmInput.value.trim();
            if (userInput === "OK") {
                modalOverlay.style.opacity = "0";
                setTimeout(() => {
                    modalOverlay.style.display = "none";
                    // 尝试获取基址
                    try {
                        memoryBase = getMemoryBase();
                        if (memoryBase) {
                            // 测试偏移链是否有效
                            try {
                                getFinalAddress();
                                // 无需底部状态栏，成功不弹窗
                            } catch(e) {
                                alert("偏移链无效，请检查游戏版本：" + e.message);
                            }
                        } else {
                            alert("无法获取UnityFramework基址，请确保在游戏内运行");
                        }
                    } catch(e) {
                        alert("初始化失败：" + e.message);
                    }
                    mainTool.classList.add("visible");
                    // 绑定事件（重新获取最新按钮）
                    const btns = refreshButtons();
                    const newBtn1 = btns.btn1.cloneNode(true);
                    const newBtn2 = btns.btn2.cloneNode(true);
                    btns.btn1.parentNode.replaceChild(newBtn1, btns.btn1);
                    btns.btn2.parentNode.replaceChild(newBtn2, btns.btn2);
                    document.getElementById('button1').addEventListener('click', toggle2x);
                    document.getElementById('button2').addEventListener('click', customDistance);
                    // 更新全局变量指向新按钮
                    window.btn1 = document.getElementById('button1');
                    window.btn2 = document.getElementById('button2');
                    // 将外部变量重新绑定（因为toggle2x/customDistance内部使用了btn1, btn2，需要更新）
                    // 简单重新赋值
                    Object.assign(btn1, { ...window.btn1 });
                    Object.assign(btn2, { ...window.btn2 });
                }, 200);
            } else {
                modalError.innerText = "⚠️ 请输入「OK」确认条款";
                confirmInput.style.borderColor = "#e67e22";
                setTimeout(() => {
                    modalError.innerText = "";
                    confirmInput.style.borderColor = "#d4dcd4";
                }, 1500);
            }
        }

        confirmBtn.addEventListener('click', verifyAndEnter);
        confirmInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') verifyAndEnter(); });

        mainTool.classList.remove('visible');
        modalOverlay.style.display = 'flex';
    })();
</script>
</body>
</html>
